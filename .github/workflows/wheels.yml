name: Build and publish wheels

# Builds wheels of PyTorch3D for:
#   * Linux  x86_64   - CPU, CUDA 12.6, CUDA 13.0, CUDA 13.2
#   * Linux  aarch64  - CPU, CUDA 12.6, CUDA 13.0, CUDA 13.2  (native ARM runner)
#   * macOS  x86_64   - CPU only (Intel)
#   * macOS  arm64    - CPU only (Apple Silicon)
# across CPython 3.10 - 3.14, using cibuildwheel v3.4.1.
#
# Minimum PyTorch: 2.12.0.
#
# Distribution layout (avoids PyPI filename collisions):
#   easypytorch3d         - CUDA 13.0 Linux wheels  +  macOS CPU wheels  +  sdist
#                           (published to PyPI; this is the default `pip install`)
#   easypytorch3d-cpu     - Linux CPU wheels                (GitHub Release only)
#   easypytorch3d-cu126   - Linux CUDA 12.6 wheels          (GitHub Release only)
#   easypytorch3d-cu132   - Linux CUDA 13.2 wheels          (GitHub Release only)
#
# Triggers
#   * push tag `vX.Y.Z`   -> build everything, publish PyPI, create GH Release
#   * workflow_dispatch   -> build everything, optional publish
#   * pull_request        -> build only, never publish
#
# CUDA install pattern is from StackOverflow (user2978125 + mheyman's GPG-key
# tip), adapted to rhel8 + sbsa for the modern manylinux_2_28 image.
#
# ABI3 / single-wheel-per-Python-and-torch (a la flash-attn-3) requires porting
# pytorch3d/csrc/** from at::Tensor / c10::* to torch::stable. That is a source
# refactor, not a CI change.

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/wheels.yml"
      - "scripts/rename_distribution.py"
      - "setup.py"
      - "pyproject.toml"
      - "pytorch3d/csrc/**"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI and create GitHub Release"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: ${{ matrix.dist_name }} • ${{ matrix.archs }} • ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- Linux CPU  (GH Release only; renamed `-cpu` to avoid PyPI collision with cu130) ----
          - { os: ubuntu-22.04,     archs: x86_64,  variant: cpu,   cuda: "",       cuda_short: "",     dist_name: easypytorch3d-cpu,   platform: linux }
          - { os: ubuntu-22.04-arm, archs: aarch64, variant: cpu,   cuda: "",       cuda_short: "",     dist_name: easypytorch3d-cpu,   platform: linux }
          # ---- macOS CPU  (the ONLY macOS option -> goes to PyPI under bare name) ----
          - { os: macos-14,         archs: arm64,   variant: cpu,   cuda: "",       cuda_short: "",     dist_name: easypytorch3d,       platform: macos }
          # ---- CUDA 12.6  (GH Release only) ----
          - { os: ubuntu-22.04,     archs: x86_64,  variant: cu126, cuda: "12.6.3", cuda_short: "12-6", dist_name: easypytorch3d-cu126, platform: linux }
          - { os: ubuntu-22.04-arm, archs: aarch64, variant: cu126, cuda: "12.6.3", cuda_short: "12-6", dist_name: easypytorch3d-cu126, platform: linux }
          # ---- CUDA 13.0  (PyPI default + GH Release) ----
          - { os: ubuntu-22.04,     archs: x86_64,  variant: cu130, cuda: "13.0.1", cuda_short: "13-0", dist_name: easypytorch3d,       platform: linux }
          - { os: ubuntu-22.04-arm, archs: aarch64, variant: cu130, cuda: "13.0.1", cuda_short: "13-0", dist_name: easypytorch3d,       platform: linux }
          # ---- CUDA 13.2  (GH Release only) ----
          - { os: ubuntu-22.04,     archs: x86_64,  variant: cu132, cuda: "13.2.0", cuda_short: "13-2", dist_name: easypytorch3d-cu132, platform: linux }
          - { os: ubuntu-22.04-arm, archs: aarch64, variant: cu132, cuda: "13.2.0", cuda_short: "13-2", dist_name: easypytorch3d-cu132, platform: linux }
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # Host-side CUDA install (gives `nvcc` on the runner). Only used for
      # debug; the actual compile inside the container has its own CUDA
      # installed in CIBW_BEFORE_ALL_LINUX. Jimver/cuda-toolkit officially
      # tests x86_64 Linux only, so we restrict.
      - name: Install CUDA on host
        if: matrix.cuda != '' && matrix.archs == 'x86_64'
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ matrix.cuda }}
          method: network
          sub-packages: '["nvcc", "cudart-dev", "libraries-dev"]'
          log-file-suffix: "${{ matrix.archs }}-${{ matrix.variant }}.txt"

      # Restore ccache from previous runs (per-matrix-row).
      # The .cu source files dominate compile time and don't include Python.h,
      # so a single cache hits across all 5 cp310-cp314 builds in the same job.
      - name: Restore ccache
        uses: actions/cache@v5
        with:
          path: /tmp/ccache
          key: ccache-${{ matrix.os }}-${{ matrix.archs }}-${{ matrix.variant }}-${{ github.run_id }}
          restore-keys: |
            ccache-${{ matrix.os }}-${{ matrix.archs }}-${{ matrix.variant }}-
            ccache-${{ matrix.os }}-${{ matrix.archs }}-

      # macOS runs without a container, so ccache is installed/wired on the
      # host. (For Linux, this happens inside the manylinux container in
      # CIBW_BEFORE_ALL_LINUX below.)
      - name: Install ccache (macOS)
        if: matrix.platform == 'macos'
        run: |
          brew install ccache
          mkdir -p "$HOME/ccache_wrappers" /tmp/ccache
          for c in cc c++ clang clang++ gcc g++; do
            ln -sf "$(which ccache)" "$HOME/ccache_wrappers/$c"
          done
          echo "$HOME/ccache_wrappers" >> "$GITHUB_PATH"
          {
            echo "CCACHE_DIR=/tmp/ccache"
            echo "CCACHE_MAXSIZE=5G"
            echo "CCACHE_COMPRESS=1"
            echo "CCACHE_COMPILERCHECK=content"
          } >> "$GITHUB_ENV"
          ccache -M 5G
          ccache -z   # zero stats so the build's hit rate is visible at end
          ccache -s

      - name: Rename distribution to ${{ matrix.dist_name }}
        run: python3 scripts/rename_distribution.py "${{ matrix.dist_name }}"

      - name: Configure per-variant environment
        shell: bash
        run: |
          {
            echo "VARIANT=${{ matrix.variant }}"
            echo "CUDA_VERSION=${{ matrix.cuda }}"
            echo "CUDA_SHORT=${{ matrix.cuda_short }}"
            echo "MAX_JOBS=4"
          } >> "$GITHUB_ENV"
          if [ -z "${{ matrix.cuda }}" ]; then
            {
              echo "PYTORCH3D_FORCE_NO_CUDA=1"
              echo "FORCE_CUDA=0"
              echo "TORCH_INDEX=https://download.pytorch.org/whl/cpu"
            } >> "$GITHUB_ENV"
          else
            # GPU arch list is variant-specific: cu126 (CUDA 12.6) does not
            # know sm_100/120 (Blackwell, added in CUDA 12.8). cu130/cu132 do.
            case "${{ matrix.variant }}" in
              # CUDA 12.6 supports sm_70 (Volta) through sm_90 (Hopper).
              cu126)        ARCHS="7.0 7.5 8.0 8.6 8.9 9.0+PTX" ;;
              # CUDA 13.x DROPS sm_70 (`nvcc fatal: Unsupported gpu architecture
              # compute_70`). Min sm_75 (Turing). sm_100 = Blackwell datacenter,
              # sm_120 = Blackwell consumer. sm_110 is NOT a real arch.
              cu130|cu132)  ARCHS="7.5 8.0 8.6 8.9 9.0 10.0 12.0+PTX" ;;
              *)            ARCHS="7.5 8.0 8.6 8.9 9.0+PTX" ;;
            esac
            {
              echo "FORCE_CUDA=1"
              echo "CUDA_HOME=/usr/local/cuda"
              # CUDA 11+ ships CUB at /usr/local/cuda/include/cub.
              # Without this, pytorch3d/setup.py warns and never adds CUB to
              # include_dirs, and the CUDA compile fails.
              echo "CUB_HOME=/usr/local/cuda/include"
              echo "TORCH_CUDA_ARCH_LIST=${ARCHS}"
              echo "TORCH_INDEX=https://download.pytorch.org/whl/${{ matrix.variant }}"
            } >> "$GITHUB_ENV"
            # cu126 needs gcc <= 13 (default is 14 in manylinux_2_28 2026.03.20-1).
            # No explicit CC/CXX needed: PATH-based ccache masquerade picks the
            # right gcc because BEFORE_ALL_LINUX puts gcc-toolset-13 in PATH
            # and ccache resolves the next `gcc` after itself.
          fi

      - name: Build wheels with cibuildwheel
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          # musllinux is not supported by upstream PyTorch wheels.
          CIBW_SKIP: "*-musllinux*"
          CIBW_ARCHS_LINUX: ${{ matrix.archs }}
          CIBW_ARCHS_MACOS: ${{ matrix.archs }}

          # Modern manylinux (AlmaLinux 8 based) - ships gcc 12, libstdc++ for C++17.
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28
          CIBW_MANYLINUX_AARCH64_IMAGE: manylinux_2_28

          # cibuildwheel's default isolated build env would re-resolve torch
          # from PyPI (x86_64 pulls CUDA-12, huge). --no-build-isolation lets
          # the matching torch we install in CIBW_BEFORE_BUILD win.
          CIBW_BUILD_FRONTEND: "pip; args: --no-build-isolation"

          CIBW_ENVIRONMENT_PASS_LINUX: >-
            VARIANT CUDA_VERSION CUDA_SHORT MAX_JOBS
            PYTORCH3D_FORCE_NO_CUDA FORCE_CUDA
            CUDA_HOME CUB_HOME TORCH_CUDA_ARCH_LIST TORCH_INDEX

          # Mount the host's ccache directory into the container so ccache
          # state persists via actions/cache between runs.
          CIBW_CONTAINER_ENGINE: "docker; create_args: --volume=/tmp/ccache:/tmp/ccache"

          # Wrappers at /opt/ccache_wrappers (created in BEFORE_ALL_LINUX) sit
          # before /usr/bin so a `gcc`/`g++` lookup goes through ccache. For
          # cu126 we additionally put gcc-toolset-13's bindir on PATH so the
          # masquerade resolves to gcc 13 (CUDA 12.6 max).
          CIBW_ENVIRONMENT_LINUX: >-
            PATH=/opt/ccache_wrappers:/opt/rh/gcc-toolset-13/root/usr/bin:$PATH
            CCACHE_DIR=/tmp/ccache
            CCACHE_MAXSIZE=5G
            CCACHE_COMPRESS=1
            CCACHE_COMPILERCHECK=content
            CCACHE_BASEDIR=/project

          # macOS is CPU only - no CUDA SDK on the runners.
          CIBW_ENVIRONMENT_MACOS: >-
            PYTORCH3D_FORCE_NO_CUDA=1
            FORCE_CUDA=0
            MAX_JOBS=4
            TORCH_INDEX=https://download.pytorch.org/whl/cpu
            CCACHE_DIR=/tmp/ccache
            CCACHE_MAXSIZE=5G
            CCACHE_COMPRESS=1
            CCACHE_COMPILERCHECK=content

          # Install CUDA inside the manylinux container for CUDA variants.
          # h/t StackOverflow user2978125 / mheyman; adapted to rhel8 + sbsa.
          CIBW_BEFORE_ALL_LINUX: |
            set -ex

            # ----- ccache (always; speeds up all subsequent Python builds) -----
            dnf install -y ccache
            mkdir -p /opt/ccache_wrappers /tmp/ccache
            for c in gcc g++ cc c++ clang clang++; do
              ln -sf "$(command -v ccache)" "/opt/ccache_wrappers/$c"
            done
            ccache -M 5G
            ccache -z   # zero stats so the end-of-build numbers are meaningful

            # ----- CUDA toolkit (only for CUDA variants) -----
            if [ "${VARIANT}" != "cpu" ]; then
              ARCH=$(uname -m)
              if [ "$ARCH" = "aarch64" ]; then
                REPO_DIR="rhel8/sbsa"
              else
                REPO_DIR="rhel8/x86_64"
              fi
              KEY_URL="https://developer.download.nvidia.com/compute/cuda/repos/${REPO_DIR}/D42D0685.pub"
              REPO_URL="https://developer.download.nvidia.com/compute/cuda/repos/${REPO_DIR}/cuda-rhel8.repo"
              rpm --import "${KEY_URL}" || true
              dnf install -y dnf-plugins-core
              dnf config-manager --add-repo "${REPO_URL}"
              dnf clean all
              dnf install -y "cuda-toolkit-${CUDA_SHORT}"
              ln -snf "/usr/local/cuda-${CUDA_VERSION%.*}" /usr/local/cuda

              # Replace nvcc with a ccache wrapper IN-PLACE. torch invokes nvcc
              # by absolute path (`$CUDA_HOME/bin/nvcc`), so the PATH-based
              # /opt/ccache_wrappers/ symlinks above wouldn't catch it.
              if [ -f /usr/local/cuda/bin/nvcc ] && [ ! -f /usr/local/cuda/bin/nvcc.real ]; then
                mv /usr/local/cuda/bin/nvcc /usr/local/cuda/bin/nvcc.real
                cat > /usr/local/cuda/bin/nvcc <<'WRAPPER'
            #!/bin/sh
            exec ccache /usr/local/cuda/bin/nvcc.real "$@"
            WRAPPER
                chmod +x /usr/local/cuda/bin/nvcc
              fi
              /usr/local/cuda/bin/nvcc --version
            fi

            # manylinux_2_28's default gcc is 14.x as of 2026.03.20-1, but
            # CUDA 12.6 only supports gcc <= 13. Install gcc-toolset-13 for
            # cu126. cu130/cu132 support gcc 14, so they keep the default.
            if [ "${VARIANT}" = "cu126" ]; then
              dnf install -y gcc-toolset-13 gcc-toolset-13-gcc-c++
            fi
            ccache -s

          CIBW_BEFORE_BUILD: |
            python -m pip install --upgrade pip setuptools wheel ninja
            python -m pip install "torch>=2.12.0" --index-url "${TORCH_INDEX}"
            command -v ccache && ccache -s || true

          # Skip auditwheel/delocate REPAIR for torch extensions.
          #
          # `torch.utils.cpp_extension.BuildExtension` already sets the right
          # RUNPATH ($ORIGIN/../torch/lib on Linux, @rpath on macOS) so the
          # built `_C.so` finds libtorch_cpu / libc10 / libtorch_cuda inside
          # the user's `torch` install at runtime.
          #
          # auditwheel/delocate's job is to bundle external libs INTO the wheel
          # and rewrite the rpath; even with --exclude they still rewrite the
          # rpath, leaving the wheel pointing to a libs/ dir that doesn't
          # contain the excluded torch libs -> ImportError: libc10.so: cannot
          # open shared object file. (See torchvision / torchaudio which take
          # the same approach.)
          #
          # On Linux we still need to retag `linux_x86_64` -> `manylinux_2_28`
          # for PyPI to accept the wheel; the wheel binary itself is left intact.
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: |
            python -m pip install --quiet wheel
            python -m wheel tags --platform-tag "manylinux_2_28_$(uname -m)" --remove {wheel}
            mv "$(dirname {wheel})"/*manylinux_2_28*.whl {dest_dir}/

          CIBW_REPAIR_WHEEL_COMMAND_MACOS: |
            cp {wheel} {dest_dir}/

          # CPU wheels: smoke-import; CUDA wheels: skip (GH runners have no GPU).
          CIBW_TEST_COMMAND_LINUX: |
            pip install "torch>=2.12.0" --index-url "${TORCH_INDEX}" && \
              python -c "import pytorch3d, pytorch3d._C; print(pytorch3d.__version__)"
          CIBW_TEST_COMMAND_MACOS: |
            pip install "torch>=2.12.0" --index-url https://download.pytorch.org/whl/cpu && \
              python -c "import pytorch3d, pytorch3d._C; print(pytorch3d.__version__)"
          CIBW_TEST_SKIP: ${{ matrix.cuda != '' && '*' || '' }}

          CIBW_BUILD_VERBOSITY: 1
          MACOSX_DEPLOYMENT_TARGET: ${{ matrix.archs == 'arm64' && '11.0' || '10.15' }}

      - name: Upload wheels
        uses: actions/upload-artifact@v7
        with:
          name: wheels-${{ matrix.dist_name }}-${{ matrix.platform }}-${{ matrix.archs }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: sdist (easypytorch3d)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Rename distribution
        run: python3 scripts/rename_distribution.py easypytorch3d

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install "setuptools>=64" wheel build
          python -m pip install "torch>=2.12.0" \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Build sdist
        env:
          PYTORCH3D_NO_EXTENSION: "1"
        run: python -m build --sdist --no-isolation

      - uses: actions/upload-artifact@v7
        with:
          name: sdist-easypytorch3d
          path: ./dist/*.tar.gz
          if-no-files-found: error

  publish_pypi:
    name: Publish CUDA 13.0 + macOS to PyPI (easypytorch3d)
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-22.04
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.publish == true)
    environment:
      name: pypi-easypytorch3d
      url: https://pypi.org/p/easypytorch3d
    permissions:
      id-token: write   # PyPI Trusted Publishing (OIDC)
      contents: read
    steps:
      # Only artifacts whose dist_name is exactly `easypytorch3d`.
      # That's cu130 Linux wheels + macOS CPU wheels + sdist.
      - name: Download cu130 Linux wheels
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: "wheels-easypytorch3d-linux-*"
          merge-multiple: true
      - name: Download macOS wheels
        uses: actions/download-artifact@v8
        with:
          path: dist
          pattern: "wheels-easypytorch3d-macos-*"
          merge-multiple: true
      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist-easypytorch3d
          path: dist

      - name: List artifacts
        run: ls -la dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          print-hash: true

  github_release:
    name: Attach all wheels to GitHub Release
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-22.04
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && inputs.publish == true)
    permissions:
      contents: write   # create release + upload assets
    steps:
      - name: Download ALL wheel artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: "wheels-*"
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@v8
        with:
          name: sdist-easypytorch3d
          path: release-assets

      - name: List assets
        run: ls -la release-assets/

      - name: Create/Update GitHub Release with all assets
        uses: softprops/action-gh-release@v3
        with:
          # If triggered manually (no tag), still produce a draft release.
          tag_name: ${{ github.event_name == 'push' && github.ref_name || format('manual-{0}', github.run_id) }}
          draft: ${{ github.event_name != 'push' }}
          generate_release_notes: ${{ github.event_name == 'push' }}
          name: ${{ github.event_name == 'push' && github.ref_name || format('Manual build {0}', github.run_id) }}
          files: |
            release-assets/*.whl
            release-assets/*.tar.gz
          fail_on_unmatched_files: true
          body: |
            Prebuilt PyTorch3D wheels (`easypytorch3d`) for Python 3.10 - 3.14.

            ### What's on PyPI

            `pip install easypytorch3d` installs the **CUDA 13.0** Linux build (or the macOS CPU build on macOS).

            ### What's attached here

            Every variant is below; pick the one matching your environment:

            | File pattern | Platform | Compute |
            | --- | --- | --- |
            | `easypytorch3d-…-manylinux_2_28_x86_64.whl` / `…_aarch64.whl`   | Linux | CUDA 13.0 (default) |
            | `easypytorch3d_cpu-…-manylinux_2_28_*.whl`     | Linux | CPU |
            | `easypytorch3d_cu126-…-manylinux_2_28_*.whl`   | Linux | CUDA 12.6 |
            | `easypytorch3d_cu132-…-manylinux_2_28_*.whl`   | Linux | CUDA 13.2 |
            | `easypytorch3d-…-macosx_*.whl`                 | macOS | CPU |

            All wheels require `torch>=2.12.0` from the matching index, e.g.

            ```bash
            pip install easypytorch3d_cu126 --extra-index-url https://download.pytorch.org/whl/cu126
            ```
